server {
  listen 80;
  server_name _;

  root /usr/share/nginx/html;
  index index.html;

  # gzip everything we serve
  gzip on;
  gzip_min_length 1024;
  gzip_proxied any;
  gzip_types
    text/plain
    text/css
    text/javascript
    application/javascript
    application/json
    image/svg+xml
    font/woff2;

  # long cache for hashed asset bundles
  location /assets/ {
    expires 1y;
    add_header Cache-Control "public, immutable";
    access_log off;
  }

  # SPA fallback: any unknown path serves index.html
  location / {
    try_files $uri $uri/ /index.html;
  }
}
