# =============================================================================
# Production Nginx — runs on EC2 inside the `portfolio-nginx` container.
# Public entry for the BACKEND API only. The frontend is served by CloudFront.
#
# Replace `iamali.duckdns.org` with your DuckDNS subdomain in Phase 5.
# =============================================================================

# HTTP — redirect everything to HTTPS, except the Let's Encrypt challenge.
server {
  listen 80;
  server_name iamali.duckdns.org;

  location /.well-known/acme-challenge/ {
    root /var/www/certbot;
  }

  location / {
    return 301 https://$host$request_uri;
  }
}

# HTTPS — terminates TLS, proxies everything to the api container.
server {
  listen 443 ssl http2;
  server_name iamali.duckdns.org;

  ssl_certificate     /etc/letsencrypt/live/iamali.duckdns.org/fullchain.pem;
  ssl_certificate_key /etc/letsencrypt/live/iamali.duckdns.org/privkey.pem;
  ssl_protocols       TLSv1.2 TLSv1.3;
  ssl_prefer_server_ciphers on;
  ssl_session_cache   shared:SSL:10m;

  # Hardening headers
  add_header X-Frame-Options "DENY" always;
  add_header X-Content-Type-Options "nosniff" always;
  add_header Referrer-Policy "strict-origin-when-cross-origin" always;
  add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;

  # Cap request body — same as Express limit
  client_max_body_size 200k;

  location / {
    proxy_pass         http://api:4000;
    proxy_http_version 1.1;
    proxy_set_header   Host              $host;
    proxy_set_header   X-Real-IP         $remote_addr;
    proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
    proxy_set_header   X-Forwarded-Proto $scheme;
    proxy_read_timeout 30s;
  }
}
